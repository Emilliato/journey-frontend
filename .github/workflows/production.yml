name: Journey Frontend Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Angular 21 needs Node 20.19+/22.12+ — Startup Canvas's Node 18
          # would fail the build, so this is the one intentional difference.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        if: success()
        run: aws s3 sync ./dist/learnbridge-web/browser s3://journey.co.za

      # Without this, CloudFront keeps serving cached copies of index.html,
      # ngsw.json, and ngsw-worker.js until their TTL expires — users stay
      # on the old app version (and the service worker never learns an
      # update exists). Invalidate everything; hashed bundles are unaffected
      # by design and /* counts as one path against the free-tier 1000/month.
      - name: Invalidate CloudFront
        if: success()
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?DomainName=='d25qd2jtfjwsop.cloudfront.net'].Id | [0]" \
            --output text)

          if [ -z "$DISTRIBUTION_ID" ] || [ "$DISTRIBUTION_ID" = "None" ]; then
            echo "::error::CloudFront distribution for d25qd2jtfjwsop.cloudfront.net not found"
            exit 1
          fi

          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"
