@if (syncManager.status(); as status) {
  @if (status !== 'idle') {
    <div class="sync-status-badge" [class]="status">
      @switch (status) {
        @case ('syncing') {
          Syncing…
        }
        @case ('synced') {
          Synced
        }
        @case ('offline') {
          Offline
        }
        @case ('error') {
          Sync failed — will retry
        }
      }
    </div>
  }
}

<router-outlet />
